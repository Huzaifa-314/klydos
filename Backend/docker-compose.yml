version: '3.8'

services:
  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
    networks:
      - app-network
    restart: unless-stopped

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - DATABASE_URL=postgres://postgres:postgres@users_db:5432/users?sslmode=disable
      - PORT=8080
      - GIN_MODE=release
    depends_on:
      users_db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # Don't expose port externally - only accessible through API gateway
    # ports:
    #   - "8080:8080"

  # User Service Database
  users_db:
    image: postgres:15-alpine
    container_name: users_db
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Campaign Service Database
  campaigns_db:
    image: postgres:15-alpine
    container_name: campaigns_db
    environment:
      POSTGRES_DB: campaigns
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - campaigns_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Pledge Service Database
  pledges_db:
    image: postgres:15-alpine
    container_name: pledges_db
    environment:
      POSTGRES_DB: pledges
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pledges_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Payment Service Database
  payments_db:
    image: postgres:15-alpine
    container_name: payments_db
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - payments_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  users_db_data:
  campaigns_db_data:
  pledges_db_data:
  payments_db_data:

networks:
  app-network:
    driver: bridge

