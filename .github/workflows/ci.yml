name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # User Service CI
  user-service:
    name: User Service - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend/user-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: ./Backend/user-service/go.sum

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: ./Backend/user-service
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./Backend/user-service/coverage.out
          flags: user-service
          name: user-service-coverage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t user-service:test -f Dockerfile .

  # Frontend CI (if needed)
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail entire workflow if frontend fails
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: |
          # Try npm ci first, if it fails due to lockfile mismatch, use npm install
          npm ci || npm install

      - name: Run linter
        run: npm run lint || true

      - name: Build frontend
        run: npm run build

  # Docker Compose validation
  docker-compose:
    name: Docker Compose - Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        working-directory: ./Backend
        run: |
          docker compose config

