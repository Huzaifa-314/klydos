name: CD - Deploy to GCE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository to lowercase
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Extract metadata for User Service
        id: meta-user
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ steps.repo.outputs.repository }}/user-service
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/user-service
          file: ./Backend/user-service/Dockerfile
          push: true
          tags: ${{ steps.meta-user.outputs.tags }}
          labels: ${{ steps.meta-user.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway (Nginx)
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/api-gateway
          file: ./Backend/api-gateway/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ steps.repo.outputs.repository }}/api-gateway:${{ env.IMAGE_TAG }},${{ env.DOCKER_REGISTRY }}/${{ steps.repo.outputs.repository }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Google Compute Engine
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}

      - name: Add GCE host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCE_HOST }} >> ~/.ssh/known_hosts

      - name: Convert repository to lowercase
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Copy deployment files to GCE
        run: |
          ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} "mkdir -p ~/app/api-gateway"
          scp Backend/docker-compose.prod.yml ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/docker-compose.prod.yml
          scp Backend/docker-compose.yml ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/docker-compose.yml
          scp Backend/api-gateway/nginx.conf ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/api-gateway/nginx.conf
          scp Backend/api-gateway/nginx.conf.template ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/api-gateway/nginx.conf.template 2>/dev/null || true
          scp scripts/deploy.sh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/deploy.sh
          scp scripts/setup-domain.sh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/app/setup-domain.sh 2>/dev/null || true
          ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} "chmod +x ~/app/deploy.sh ~/app/setup-domain.sh 2>/dev/null || chmod +x ~/app/deploy.sh"

      - name: Deploy to GCE
        run: |
          ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} << EOF
            cd ~/app
            export DOCKER_REGISTRY="${{ env.DOCKER_REGISTRY }}"
            export GITHUB_REPOSITORY="${{ steps.repo.outputs.repository }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            bash deploy.sh
          EOF

